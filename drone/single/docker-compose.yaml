services:
  drone:
    image: drone/drone:2
    container_name: drone
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      DRONE_GITEA_SERVER: ${DRONE_GITEA_SERVER:-http://gitea:3000}
      DRONE_RPC_SECRET: ${DRONE_RPC_SECRET:-supersecret}
      DRONE_SERVER_HOST: ${DRONE_SERVER_HOST:-localhost:8088}
      DRONE_SERVER_PROTO: ${DRONE_SERVER_PROTO:-http}
    volumes:
      - drone_data:/data
    networks:
      - drone_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  drone_data:

networks:
  drone_net:
