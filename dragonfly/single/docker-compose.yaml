services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.22.0
    container_name: dragonfly
    restart: unless-stopped
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    command: >
      dragonfly
      --requirepass ${DRAGONFLY_PASSWORD:-passw0rd}
      --logtostderr
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    networks:
      - dragonfly_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DRAGONFLY_PASSWORD:-passw0rd}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dragonfly_data:

networks:
  dragonfly_net:
