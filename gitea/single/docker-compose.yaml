services:
  gitea:
    image: gitea/gitea:1.22.0
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: ${GITEA_USER_UID:-1000}
      USER_GID: ${GITEA_USER_GID:-1000}
      GITEA__database__DB_TYPE: ${GITEA_DB_TYPE:-sqlite3}
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:-localhost}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - gitea_data:/data
      - gitea_config:/etc/gitea
    networks:
      - gitea_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  gitea_data:
  gitea_config:

networks:
  gitea_net:
