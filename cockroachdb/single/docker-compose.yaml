services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.1.0
    container_name: cockroachdb
    restart: unless-stopped
    ports:
      - "${COCKROACHDB_SQL_PORT:-26257}:26257"
      - "${COCKROACHDB_HTTP_PORT:-8080}:8080"
    command: start-single-node --insecure
    volumes:
      - cockroachdb_data:/cockroach/cockroach-data
    networks:
      - cockroachdb_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health?ready=1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cockroachdb_data:

networks:
  cockroachdb_net:
