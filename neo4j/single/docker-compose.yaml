services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-passw0rd}
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-passw0rd}
    volumes:
      - neo4j_data:/data
    networks:
      - neo4j_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://127.0.0.1:7687 -u \"${NEO4J_USER:-neo4j}\" -p \"${NEO4J_PASSWORD:-passw0rd}\" \"RETURN 1\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  neo4j_data:

networks:
  neo4j_net:

