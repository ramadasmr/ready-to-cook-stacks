services:
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata_data:/var/lib/netdata
    networks:
      - netdata_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:19999/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  netdata_data:

networks:
  netdata_net:
