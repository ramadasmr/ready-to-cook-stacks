services:
  trino:
    image: trinodb/trino:460
    container_name: trino
    restart: unless-stopped
    ports:
      - "${TRINO_HTTP_PORT:-8080}:8080"
    volumes:
      - trino_catalog:/etc/trino/catalog
      - trino_data:/var/trino/data
    networks:
      - trino_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  trino_catalog:
  trino_data:

networks:
  trino_net:
