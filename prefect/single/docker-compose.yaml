services:
  prefect:
    image: prefecthq/prefect:3.0.0-python3.12
    container_name: prefect
    restart: unless-stopped
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_DATABASE_CONNECTION_URL: sqlite+aiosqlite:////home/user/prefect.db
      PREFECT_UI_URL: ${PREFECT_UI_URL:-http://localhost:4200}
    volumes:
      - prefect_data:/home/user
    networks:
      - prefect_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4200/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prefect_data:

networks:
  prefect_net:
