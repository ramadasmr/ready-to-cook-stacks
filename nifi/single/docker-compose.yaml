services:
  nifi:
    image: apache/nifi:1.27.0
    container_name: nifi
    restart: unless-stopped
    ports:
      - "${NIFI_HTTPS_PORT:-8443}:8443"
    environment:
      NIFI_WEB_HTTPS_PORT: "8443"
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-passw0rdpassw0rd}
    volumes:
      - nifi_data:/opt/nifi/nifi-current/state
    networks:
      - nifi_net

volumes:
  nifi_data:

networks:
  nifi_net:

