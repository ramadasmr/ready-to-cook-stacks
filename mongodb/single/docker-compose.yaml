services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-passw0rd}
    volumes:
      - mongodb_data:/data/db
    networks:
      - mongodb_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"${MONGO_INITDB_ROOT_USERNAME:-admin}\" -p \"${MONGO_INITDB_ROOT_PASSWORD:-passw0rd}\" --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1 >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:

networks:
  mongodb_net:

