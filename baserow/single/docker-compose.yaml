services:
  baserow:
    image: baserow/baserow:1.30.1
    container_name: baserow
    restart: unless-stopped
    ports:
      - "${BASEROW_HTTP_PORT:-80}:80"
      - "${BASEROW_HTTPS_PORT:-443}:443"
    environment:
      BASEROW_PUBLIC_URL: ${BASEROW_PUBLIC_URL:-http://localhost}
    volumes:
      - baserow_data:/baserow/data
    networks:
      - baserow_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/_health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  baserow_data:

networks:
  baserow_net:
