services:
  solr:
    image: solr:9
    container_name: solr
    restart: unless-stopped
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - solr_data:/var/solr
    networks:
      - solr_net
    healthcheck:
      test: ["CMD", "solr", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  solr_data:

networks:
  solr_net:

