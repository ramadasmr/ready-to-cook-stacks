services:
  surrealdb:
    image: surrealdb/surrealdb:v2.0.4
    container_name: surrealdb
    restart: unless-stopped
    ports:
      - "${SURREALDB_PORT:-8000}:8000"
    command: >
      start
      --log info
      --user ${SURREAL_USER:-root}
      --pass ${SURREAL_PASS:-passw0rd}
      file:///var/lib/surrealdb/data.db
    volumes:
      - surrealdb_data:/var/lib/surrealdb
    networks:
      - surrealdb_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  surrealdb_data:

networks:
  surrealdb_net:
