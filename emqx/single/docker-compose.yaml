services:
  emqx:
    image: emqx/emqx:5.8.0
    container_name: emqx
    restart: unless-stopped
    ports:
      - "${EMQX_MQTT_PORT:-1883}:1883"
      - "${EMQX_MQTTS_PORT:-8883}:8883"
      - "${EMQX_WS_PORT:-8083}:8083"
      - "${EMQX_WSS_PORT:-8084}:8084"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:-emqxsecretcookie}
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-passw0rd}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - emqx_net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  emqx_data:
  emqx_log:

networks:
  emqx_net:
