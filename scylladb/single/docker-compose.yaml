services:
  scylladb:
    image: scylladb/scylla:6.2
    container_name: scylladb
    restart: unless-stopped
    ports:
      - "9042:9042"
      - "9160:9160"
    command: >
      --authenticator PasswordAuthenticator
      --authorizer CassandraAuthorizer
    volumes:
      - scylladb_data:/var/lib/scylla
    networks:
      - scylladb_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -u ${SCYLLA_USER:-cassandra} -p ${SCYLLA_PASSWORD:-passw0rd} -e 'describe cluster' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  scylladb_data:

networks:
  scylladb_net:
