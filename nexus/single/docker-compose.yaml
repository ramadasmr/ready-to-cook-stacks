services:
  nexus:
    image: sonatype/nexus3:3.68.0
    container_name: nexus
    restart: unless-stopped
    environment:
      NEXUS_SECURITY_RANDOMPASSWORD: ${NEXUS_SECURITY_RANDOMPASSWORD:-false}
    ports:
      - "${NEXUS_HTTP_PORT:-8081}:8081"
      - "${NEXUS_DOCKER_PORT:-5000}:5000"
    volumes:
      - nexus_data:/nexus-data
    networks:
      - nexus_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/service/rest/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  nexus_data:

networks:
  nexus_net:
