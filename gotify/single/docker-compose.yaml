services:
  gotify:
    image: gotify/server:2.5.0
    container_name: gotify
    restart: unless-stopped
    ports:
      - "${GOTIFY_PORT:-8080}:80"
    environment:
      GOTIFY_DEFAULTUSER_NAME: ${GOTIFY_ADMIN_USER:-admin}
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_ADMIN_PASSWORD:-passw0rd}
      GOTIFY_DATABASE_DIALECT: sqlite3
      GOTIFY_DATABASE_CONNECTION: data/gotify.db
    volumes:
      - gotify_data:/app/data
    networks:
      - gotify_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  gotify_data:

networks:
  gotify_net:
